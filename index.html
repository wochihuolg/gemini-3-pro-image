<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gemini-3-Pro-Image 生图工具</title>
<style>
  :root {
    --bg: #0f1117;
    --card: #1a1d29;
    --border: #2a2e3e;
    --text: #e4e6f0;
    --text-dim: #888ba0;
    --accent: #7c5cfc;
    --accent-hover: #9577ff;
    --accent-glow: rgba(124,92,252,0.3);
    --green: #34d399;
    --red: #f87171;
    --radius: 12px;
    --radius-sm: 8px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
    background: var(--bg); color: var(--text);
    min-height: 100vh; display: flex; justify-content: center; padding: 20px;
  }
  .container { max-width: 860px; width: 100%; padding: 20px 0; }
  .header { text-align: center; margin-bottom: 28px; }
  .header h1 {
    font-size: 26px; font-weight: 700;
    background: linear-gradient(135deg, #7c5cfc, #a78bfa);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  }
  .header p { color: var(--text-dim); font-size: 14px; margin-top: 4px; }
  .card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px 24px; margin-bottom: 16px; }
  .card-title { font-size: 14px; font-weight: 600; color: var(--text-dim); margin-bottom: 12px; display: flex; align-items: center; gap: 6px; }
  .card-title .badge { background: var(--accent); color: #fff; font-size: 10px; padding: 1px 8px; border-radius: 10px; margin-left: 6px; }
  .form-group { margin-bottom: 12px; }
  .form-group label { display: block; font-size: 12px; color: var(--text-dim); margin-bottom: 4px; font-weight: 500; }
  input, select, textarea {
    width: 100%; padding: 10px 12px; background: var(--bg); border: 1px solid var(--border);
    border-radius: var(--radius-sm); color: var(--text); font-size: 14px; outline: none; transition: border-color 0.2s;
  }
  input:focus, select:focus, textarea:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }
  textarea { resize: vertical; min-height: 90px; font-family: inherit; line-height: 1.6; }
  select { cursor: pointer; appearance: none; padding-right: 32px; }
  select option { background: var(--card); color: var(--text); }
  .btn {
    display: inline-flex; align-items: center; justify-content: center; gap: 6px;
    padding: 10px 22px; border-radius: var(--radius-sm); border: none;
    font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.2s;
  }
  .btn-primary { background: var(--accent); color: #fff; width: 100%; padding: 12px; font-size: 15px; }
  .btn-primary:hover { background: var(--accent-hover); transform: translateY(-1px); }
  .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
  .btn-secondary { background: var(--border); color: var(--text); flex: 1; }
  .btn-secondary:hover { background: #3a3f55; }
  .btn-secondary:disabled { opacity: 0.4; cursor: not-allowed; }
  .upload-zone { border: 2px dashed var(--border); border-radius: var(--radius-sm); padding: 20px; text-align: center; cursor: pointer; transition: all 0.2s; }
  .upload-zone:hover { border-color: var(--accent); background: rgba(124,92,252,0.06); }
  .upload-zone.has-image { border-color: var(--accent); padding: 10px; }
  .upload-zone input[type="file"] { display: none; }
  .upload-placeholder { color: var(--text-dim); font-size: 13px; }
  .upload-placeholder .icon { font-size: 28px; display: block; margin-bottom: 6px; }
  .upload-preview { display: flex; align-items: center; gap: 12px; }
  .upload-preview img { width: 64px; height: 64px; object-fit: cover; border-radius: 6px; border: 1px solid var(--border); }
  .upload-preview .info { flex: 1; text-align: left; }
  .upload-preview .info .name { font-size: 13px; }
  .upload-preview .info .size { font-size: 11px; color: var(--text-dim); }
  .upload-preview .remove-btn { background: none; border: none; color: var(--red); cursor: pointer; font-size: 18px; padding: 4px; }
  .upload-preview .remove-btn:hover { opacity: 0.7; }
  .ref-url-row { display: flex; gap: 8px; margin-top: 8px; }
  .ref-url-row input { flex: 1; }
  .param-row { display: flex; gap: 12px; margin-bottom: 0; }
  .param-row select { flex: 1; }
  .progress-area { margin-top: 12px; padding: 12px 16px; background: var(--bg); border-radius: var(--radius-sm); border: 1px solid var(--border); display: none; }
  .progress-area.active { display: block; }
  .progress-bar-bg { height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; margin-top: 8px; }
  .progress-bar-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--green)); border-radius: 2px; width: 0%; transition: width 0.5s; }
  .progress-text { font-size: 13px; color: var(--text-dim); display: flex; justify-content: space-between; }
  .result-area { display: none; margin-top: 12px; }
  .result-area.active { display: block; }
  .result-image { width: 100%; border-radius: var(--radius-sm); border: 1px solid var(--border); overflow: hidden; }
  .result-image img { width: 100%; display: block; }
  .result-actions { display: flex; gap: 10px; margin-top: 12px; }
  .result-actions .btn { flex: 1; }
  .cost-info { display: flex; gap: 16px; font-size: 12px; color: var(--text-dim); margin-top: 8px; padding: 8px 12px; background: var(--bg); border-radius: var(--radius-sm); }
  .cost-info span { display: flex; align-items: center; gap: 4px; }
  .error-msg { padding: 10px 14px; background: rgba(248,113,113,0.1); border: 1px solid rgba(248,113,113,0.3); border-radius: var(--radius-sm); color: var(--red); font-size: 13px; margin-top: 8px; display: none; }
  .error-msg.active { display: block; }
  .tab-bar { display: flex; gap: 0; margin-bottom: 10px; border-bottom: 1px solid var(--border); }
  .tab-btn { padding: 8px 16px; font-size: 13px; background: none; border: none; color: var(--text-dim); cursor: pointer; border-bottom: 2px solid transparent; transition: all 0.2s; }
  .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }
  .tab-btn:hover { color: var(--text); }
  .tab-content { display: none; }
  .tab-content.active { display: block; }
  @media (max-width: 600px) { body { padding: 12px; } .card { padding: 16px; } .param-row { flex-direction: column; } }
</style>
</head>
<body>
<div class="container">

  <div class="header">
    <h1>✦ Gemini-3-Pro-Image</h1>
    <p>APIMart 生图工具 · 自定义提示词 · 参考图 · 下载 · 重新生成</p>
  </div>

  <div class="card">
    <div class="card-title">📝 提示词</div>
    <textarea id="prompt" placeholder="描述你想要生成的图片内容...
例如：一只橘猫在阳光下打盹，水彩风格，温暖色调"></textarea>
  </div>

  <div class="card">
    <div class="card-title">🖼 参考图 <span class="badge">可选</span></div>
    <div class="tab-bar">
      <button class="tab-btn active" onclick="switchTab('upload')" id="tab-upload">📁 本地上传</button>
      <button class="tab-btn" onclick="switchTab('url')" id="tab-url">🔗 图片 URL</button>
    </div>
    <div class="tab-content active" id="tab-content-upload">
      <div class="upload-zone" id="uploadZone" onclick="document.getElementById('fileInput').click()">
        <input type="file" id="fileInput" accept="image/*" onchange="handleFileSelect(event)">
        <div class="upload-placeholder" id="uploadPlaceholder">
          <span class="icon">📎</span>
          点击上传参考图片（base64 内嵌，无需外部服务）
        </div>
        <div class="upload-preview" id="uploadPreview" style="display:none">
          <img id="previewImg" src="" alt="preview">
          <div class="info">
            <div class="name" id="fileName">image.jpg</div>
            <div class="size" id="fileSize">0 KB</div>
          </div>
          <button class="remove-btn" onclick="removeFile(event)">✕</button>
        </div>
      </div>
    </div>
    <div class="tab-content" id="tab-content-url">
      <div class="ref-url-row">
        <input type="url" id="refUrl" placeholder="https://example.com/photo.jpg" spellcheck="false">
      </div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">⚙️ 生成参数</div>
    <div class="param-row">
      <div class="form-group" style="flex:1; margin-bottom:0">
        <label>图片比例</label>
        <select id="imageSize">
          <option value="1:1" selected>1:1 正方形</option>
          <option value="16:9">16:9 横屏</option>
          <option value="9:16">9:16 竖屏</option>
          <option value="4:3">4:3</option>
          <option value="3:4">3:4</option>
          <option value="3:2">3:2</option>
          <option value="2:3">2:3</option>
          <option value="auto">auto 自动</option>
        </select>
      </div>
      <div class="form-group" style="flex:1; margin-bottom:0">
        <label>分辨率</label>
        <select id="resolution">
          <option value="1K">1K 基础</option>
          <option value="2K" selected>2K 推荐</option>
          <option value="4K">4K 高清</option>
        </select>
      </div>
    </div>
  </div>

  <button class="btn btn-primary" onclick="generate()" id="genBtn">🎨 生成图片</button>

  <div class="progress-area" id="progressArea">
    <div class="progress-text">
      <span id="progressLabel">提交任务中...</span>
      <span id="progressPct">0%</span>
    </div>
    <div class="progress-bar-bg"><div class="progress-bar-fill" id="progressFill"></div></div>
  </div>

  <div class="error-msg" id="errorMsg"></div>

  <div class="result-area" id="resultArea">
    <div class="card">
      <div class="card-title">🖼 生成结果</div>
      <div class="result-image"><img id="resultImg" src="" alt="Generated image"></div>
      <div class="cost-info">
        <span>💰 费用: <strong id="costValue">--</strong></span>
        <span>⏱ 耗时: <strong id="timeValue">--</strong></span>
      </div>
      <div class="result-actions">
        <button class="btn btn-secondary" onclick="downloadImage()" id="downloadBtn">💾 下载</button>
        <button class="btn btn-secondary" onclick="downloadImageWithPicker()" id="downloadAsBtn">📂 另存为...</button>
        <button class="btn btn-primary" onclick="regenerate()" id="regenBtn">🔄 重新生成</button>
      </div>
    </div>
  </div>

</div>

<script>
let currentImageUrl = null, currentImageBlob = null, uploadedBase64 = null;
let uploadedFileName = '', uploadedFileSize = 0, isGenerating = false, costData = null;

function switchTab(tab) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
  document.getElementById('tab-' + tab).classList.add('active');
  document.getElementById('tab-content-' + tab).classList.add('active');
}

function handleFileSelect(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(ev) {
    uploadedBase64 = ev.target.result;
    uploadedFileName = file.name;
    uploadedFileSize = file.size;
    document.getElementById('uploadPlaceholder').style.display = 'none';
    document.getElementById('uploadPreview').style.display = 'flex';
    document.getElementById('previewImg').src = uploadedBase64;
    document.getElementById('fileName').textContent = file.name;
    document.getElementById('fileSize').textContent = formatSize(file.size);
    document.getElementById('uploadZone').classList.add('has-image');
  };
  reader.readAsDataURL(file);
}

function removeFile(e) {
  e.stopPropagation();
  uploadedBase64 = null; uploadedFileName = ''; uploadedFileSize = 0;
  document.getElementById('fileInput').value = '';
  document.getElementById('uploadPlaceholder').style.display = 'block';
  document.getElementById('uploadPreview').style.display = 'none';
  document.getElementById('uploadZone').classList.remove('has-image');
}

function formatSize(b) { return b < 1024 ? b + ' B' : b < 1048576 ? (b / 1024).toFixed(1) + ' KB' : (b / 1048576).toFixed(1) + ' MB'; }

function getRefImageData() {
  const u = document.getElementById('refUrl').value.trim();
  return u ? u : uploadedBase64;
}

function populateApiKey() {
  let key = sessionStorage.getItem('_apimart_api_key');
  if (key) return key;
  key = prompt('请输入你的 APIMart API Key（仅本次会话有效，不会存储）：');
  if (!key || !(key = key.trim())) return null;
  sessionStorage.setItem('_apimart_api_key', key);
  return key;
}

async function submitImageTask(apiKey, prompt, size, resolution, refUrl) {
  const body = { model: 'gemini-3-pro-image-preview', prompt, size, resolution, n: 1 };
  if (refUrl) body.image_urls = [refUrl];
  const resp = await fetch('https://api.apimart.ai/v1/images/generations', {
    method: 'POST',
    headers: { 'Authorization': 'Bearer ' + apiKey, 'Content-Type': 'application/json' },
    body: JSON.stringify(body)
  });
  if (!resp.ok) {
    if (resp.status === 401) sessionStorage.removeItem('_apimart_api_key');
    let msg; try { msg = (await resp.json()).error?.message; } catch(e) { msg = await resp.text(); }
    throw new Error('提交失败 (' + resp.status + '): ' + msg);
  }
  const data = await resp.json();
  const raw = data.data;
  const taskId = Array.isArray(raw) ? raw[0]?.task_id : raw?.task_id;
  if (!taskId) throw new Error('无法获取 task_id');
  return taskId;
}

async function pollTask(apiKey, taskId, onProgress) {
  for (let i = 0; i < 120; i++) {
    await new Promise(r => setTimeout(r, 3000));
    const resp = await fetch('https://api.apimart.ai/v1/tasks/' + taskId, {
      headers: { 'Authorization': 'Bearer ' + apiKey }
    });
    if (!resp.ok) throw new Error('查询失败: ' + await resp.text());
    const d = (await resp.json()).data || {};
    onProgress(d.status || '', d.progress || 0);
    if (d.status === 'completed') {
      const url = d.result?.images?.[0]?.url?.[0];
      if (!url) throw new Error('未找到图片 URL');
      costData = { cost: d.cost, actual_time: d.actual_time };
      return url;
    }
    if (d.status === 'failed') throw new Error('任务失败: ' + (d.error || '未知错误'));
    if (d.status === 'cancelled') throw new Error('任务已取消');
  }
  throw new Error('任务超时');
}

async function generate() {
  if (isGenerating) return;
  const apiKey = populateApiKey();
  if (!apiKey) return;
  const prompt = document.getElementById('prompt').value.trim();
  if (!prompt) { showError('请输入提示词'); return; }

  isGenerating = true;
  ['genBtn','regenBtn','downloadBtn','downloadAsBtn'].forEach(id => document.getElementById(id).disabled = true);
  document.getElementById('genBtn').textContent = '⏳ 生成中...';
  hideError(); hideResult();

  const size = document.getElementById('imageSize').value;
  const resolution = document.getElementById('resolution').value;

  showProgress('准备中...', 5);
  try {
    const refUrl = getRefImageData();
    updateProgress('提交生图任务...', 15);
    const taskId = await submitImageTask(apiKey, prompt, size, resolution, refUrl);
    updateProgress('任务已提交，等待生成...', 20);
    const imgUrl = await pollTask(apiKey, taskId, (s, p) => {
      updateProgress('生成中... ' + s, Math.min(20 + p * 0.7, 90));
    });
    updateProgress('加载图片...', 95);
    currentImageUrl = imgUrl; currentImageBlob = null;
    document.getElementById('resultImg').src = imgUrl;
    document.getElementById('resultImg').onload = () => {
      updateProgress('✅ 生成完成', 100);
      showResult();
      isGenerating = false;
      ['genBtn','regenBtn','downloadBtn','downloadAsBtn'].forEach(id => document.getElementById(id).disabled = false);
      document.getElementById('genBtn').textContent = '🎨 生成图片';
      setTimeout(hideProgress, 1500);
    };
    document.getElementById('resultImg').onerror = () => {
      updateProgress('✅ 生成完成', 100);
      showResult();
      isGenerating = false;
      ['genBtn','regenBtn','downloadBtn','downloadAsBtn'].forEach(id => document.getElementById(id).disabled = false);
      document.getElementById('genBtn').textContent = '🎨 生成图片';
      setTimeout(hideProgress, 1500);
    };
    if (costData) {
      document.getElementById('costValue').textContent = costData.cost != null ? costData.cost + ' 元' : '--';
      document.getElementById('timeValue').textContent = costData.actual_time != null ? costData.actual_time + 's' : '--';
    }
    fetch(imgUrl).then(r => r.blob()).then(b => { currentImageBlob = b; }).catch(() => {});
  } catch (e) {
    showError(e.message);
    isGenerating = false;
    ['genBtn','regenBtn','downloadBtn','downloadAsBtn'].forEach(id => document.getElementById(id).disabled = false);
    document.getElementById('genBtn').textContent = '🎨 生成图片';
    hideProgress();
  }
}

async function regenerate() { hideResult(); await generate(); }

function downloadImage() {
  if (!currentImageUrl) return;
  const dl = (blob) => {
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = 'gemini3_' + Date.now() + '.png';
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    URL.revokeObjectURL(url);
  };
  if (currentImageBlob) { dl(currentImageBlob); return; }
  fetch(currentImageUrl).then(r => r.blob()).then(b => { currentImageBlob = b; dl(b); })
    .catch(() => { if (confirm('下载失败，是否打开新标签页？')) window.open(currentImageUrl, '_blank'); });
}

async function downloadImageWithPicker() {
  if (!currentImageUrl) return;
  try {
    if (!window.showSaveFilePicker) { downloadImage(); return; }
    let blob = currentImageBlob || await fetch(currentImageUrl).then(r => r.blob());
    currentImageBlob = blob;
    const ext = { 'image/png': '.png', 'image/webp': '.webp' }[blob.type] || '.jpg';
    const handle = await window.showSaveFilePicker({
      suggestedName: 'gemini3_' + Date.now() + ext,
      types: [{ description: '图片', accept: { 'image/*': ['.png','.jpg','.jpeg','.webp'] } }]
    });
    const w = await handle.createWritable();
    await w.write(blob); await w.close();
  } catch (e) { if (e.name !== 'AbortError' && e.name !== 'SecurityError') downloadImage(); }
}

function showError(m) { document.getElementById('errorMsg').textContent = m; document.getElementById('errorMsg').classList.add('active'); }
function hideError() { document.getElementById('errorMsg').classList.remove('active'); }
function showProgress(t, p) {
  document.getElementById('progressArea').classList.add('active');
  document.getElementById('progressLabel').textContent = t;
  document.getElementById('progressPct').textContent = p + '%';
  document.getElementById('progressFill').style.width = p + '%';
}
function updateProgress(t, p) {
  document.getElementById('progressLabel').textContent = t;
  document.getElementById('progressPct').textContent = p + '%';
  document.getElementById('progressFill').style.width = p + '%';
}
function hideProgress() { document.getElementById('progressArea').classList.remove('active'); }
function showResult() { document.getElementById('resultArea').classList.add('active'); }
function hideResult() {
  document.getElementById('resultArea').classList.remove('active');
  currentImageUrl = null; currentImageBlob = null; costData = null;
}
</script>
</body>
</html>
